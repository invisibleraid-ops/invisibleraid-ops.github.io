<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Моя визитка</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Карточка */
        .card {
            max-width: 450px;
            width: 100%;
            background: white;
            border-radius: 32px;
            padding: 32px 24px 40px 24px;
            text-align: center;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.4);
            transition: transform 0.2s ease;
        }

        .card:hover {
            transform: scale(1.01);
        }

        /* Круглая аватарка */
        .avatar {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid white;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.2);
            margin-bottom: 20px;
            background-color: #f0f0f0;
        }

        /* ФИО */
        h1 {
            font-size: 32px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 8px;
        }

        /* Небольшая подпись (опционально) */
        .subtitle {
            color: #666;
            font-size: 16px;
            margin-bottom: 32px;
            border-bottom: 2px solid #eee;
            display: inline-block;
            padding-bottom: 6px;
        }

        /* Блок с кнопками-ссылками */
        .links {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-top: 8px;
        }

        /* Стиль кнопок */
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 14px 20px;
            border-radius: 60px;
            text-decoration: none;
            font-weight: 600;
            font-size: 17px;
            transition: all 0.2s ease;
            background: #f3f4f6;
            color: #1f2937;
            border: 1px solid #e5e7eb;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
        }

        /* Иконки соцсетей (эмодзи, но выглядят дружелюбно) */
        .btn-icon {
            font-size: 24px;
        }

        /* Разные цвета для разных соцсетей — можно менять */
        .btn-telegram:hover {
            background: #0088cc;
            border-color: #0088cc;
            color: white;
        }

        .btn-whatsapp:hover {
            background: #25D366;
            border-color: #25D366;
            color: white;
        }

        .btn-vk:hover {
            background: #0077ff;
            border-color: #0077ff;
            color: white;
        }

        .btn-email:hover {
            background: #ea4335;
            border-color: #ea4335;
            color: white;
        }

        .btn-github:hover {
            background: #181717;
            border-color: #181717;
            color: white;
        }

        .footer-note {
            margin-top: 32px;
            font-size: 13px;
            color: #9ca3af;
        }

        /* Адаптация под телефон */
        @media (max-width: 500px) {
            .card {
                padding: 24px 20px 32px;
            }
            .avatar {
                width: 130px;
                height: 130px;
            }
            h1 {
                font-size: 26px;
            }
            .btn {
                padding: 12px 16px;
                font-size: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <!-- ВСТАВЬТЕ СВОЁ ФОТО -->

        <!-- ВАШЕ ФИО -->

</html>
